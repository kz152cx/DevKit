<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超萌奶龙 - 宇宙无敌小可爱</title>
    <style>
        /* 定义可爱的全局颜色和变量 */
        :root {
            --primary-color: #FFD700; /* 奶龙黄 */
            --secondary-color: #FFA500; /* 暖橙色 */
            --bg-color: #FFFDF5; /* 极浅的奶油黄背景 */
            --text-color: #6B5B4C; /* 柔和的咖啡色文字，比黑色更可爱 */
        }

        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* 头部封面区域 */
        header {
            background-color: var(--primary-color);
            text-align: center;
            padding: 50px 20px 30px;
            border-bottom: 6px dashed var(--secondary-color);
            box-shadow: 0 4px 15px rgba(255, 165, 0, 0.2);
            position: relative;
        }

        header h1 {
            font-size: 3.5em;
            margin: 0;
            color: #FFFFFF;
            text-shadow: 3px 3px 0px var(--secondary-color);
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 30px;
        }

        .hero-img {
            max-width: 100%;
            width: 600px; /* 控制主图最大宽度 */
            height: auto;
            border-radius: 30px; /* 圆滚滚的边框 */
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 8px solid white;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hero-img:hover {
            transform: scale(1.05) rotate(-2deg); /* 鼠标悬停时的小调皮效果 */
        }

        /* 内容容器 */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 简介卡片 */
        .about {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            margin: 40px auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            border: 3px solid #FFE4B5;
            position: relative;
        }

        .about h2 {
            color: var(--secondary-color);
            font-size: 2em;
            margin-top: 0;
        }

        .about p {
            font-size: 1.1em;
        }

        /* 照片墙网格 */
        .gallery {
            display: grid;
            /* 响应式网格：在手机上单列，在电脑上多列 */
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            padding-bottom: 40px;
        }

        .gallery-item {
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(255, 165, 0, 0.3);
            border-color: var(--primary-color);
        }

        .gallery-item img {
            width: 100%;
            height: 240px; /* 固定高度让网格看起来整齐 */
            object-fit: cover; /* 保证图片不变形，自动裁剪填充 */
            border-radius: 12px;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 30px;
            background-color: var(--secondary-color);
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            border-top: 5px solid var(--primary-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>🐉 奶龙来啦！ 🐉</h1>
        <p>你的快乐源泉，宇宙无敌呆萌小可爱</p>
        <img src="ph.jpg" alt="可爱的奶龙主视觉图" class="hero-img">
    </header>

    <div class="container">
        <section class="about">
            <h2>✨ 关于这只黄色小胖几 ✨</h2>
            <p>奶龙是一只胖乎乎、圆滚滚的黄色小恐龙。他性格呆萌、乐观开朗，还是个超级小吃货！</p>
            <p>虽然经常闹出一些搞笑的乌龙事件，但他总能用那招牌的治愈系笑容，瞬间萌化所有人的心。准备好迎接下面的可爱暴击了吗？</p>
        </section>

        <section class="gallery">
            <div class="gallery-item"><img src="1.jpg" alt="奶龙的可爱瞬间 1"></div>
            <div class="gallery-item"><img src="2.jpg" alt="奶龙的可爱瞬间 2"></div>
            <div class="gallery-item"><img src="3.jpg" alt="奶龙的可爱瞬间 3"></div>
            <div class="gallery-item"><img src="4.jpg" alt="奶龙的可爱瞬间 4"></div>
            <div class="gallery-item"><img src="5.jpg" alt="奶龙的可爱瞬间 5"></div>
            <div class="gallery-item"><img src="6.jpg" alt="奶龙的可爱瞬间 6"></div>
            <div class="gallery-item"><img src="7.jpg" alt="奶龙的可爱瞬间 7"></div>
            <div class="gallery-item"><img src="8.jpg" alt="奶龙的可爱瞬间 8"></div>
        </section>
    </div>

    <footer>
        <p>💛 本网页由超级喜欢奶龙的粉丝倾情制作 💛</p>
    </footer>

</body>
</html>
