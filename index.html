<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超萌奶龙 - 宇宙无敌小可爱</title>
    <style>
        /* 奶龙专属超级可爱调色板 */
        :root {
            --primary-color: #FFD700; /* 纯正奶龙黄 */
            --secondary-color: #FF8C00; /* 更有活力的暖橙 */
            --text-color: #5C4033; /* 浓郁的巧克力色文字 */
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.8;
            /* 奶龙专属波点背景，增加卡通感 */
            background-color: #FFFDF0;
            background-image: radial-gradient(#FFE4B5 20%, transparent 20%),
                              radial-gradient(#FFE4B5 20%, transparent 20%);
            background-position: 0 0, 30px 30px;
            background-size: 60px 60px;
        }

        /* 头部大封面区域 */
        header {
            background-color: var(--primary-color);
            text-align: center;
            padding: 60px 20px 40px;
            /* 波浪形底部边框加上厚重的阴影 */
            border-bottom: 12px dashed var(--secondary-color);
            box-shadow: 0 10px 25px rgba(255, 140, 0, 0.3);
            position: relative;
        }

        header h1 {
            font-size: 3.8em;
            margin: 0;
            color: #FFFFFF;
            /* 更有立体感的卡通文字阴影 */
            text-shadow: 4px 4px 0px var(--secondary-color), 6px 6px 0px #D2691E;
            letter-spacing: 3px;
        }

        header p {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.6);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 30px;
        }

        .hero-img {
            max-width: 100%;
            width: 480px;
            height: auto;
            border-radius: 50%; /* 主图变成彻底的圆滚滚 */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 12px solid white;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hero-img:hover {
            transform: scale(1.08) rotate(-5deg);
        }

        /* 内容容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* 分开排布的故事卡片样式 */
        .story-timeline {
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        .story-card {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-radius: 40px; /* 更夸张的圆角 */
            padding: 25px;
            gap: 40px;
            box-shadow: 0 15px 30px rgba(255, 165, 0, 0.15);
            /* 更粗的卡通风边框 */
            border: 5px solid var(--primary-color);
            transition: all 0.4s ease;
        }

        .story-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--secondary-color);
            box-shadow: 0 20px 40px rgba(255, 140, 0, 0.25);
        }

        .story-card.reverse {
            flex-direction: row-reverse;
        }

        .story-img-wrapper {
            flex: 0 0 50%;
        }

        .story-img-wrapper img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 30px;
            border: 4px dashed #FFE4B5;
        }

        .story-text {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .story-text h3 {
            color: var(--secondary-color);
            font-size: 2.8em;
            margin: 0;
            background: var(--primary-color);
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            text-shadow: 2px 2px 0px var(--secondary-color);
            transform: rotate(-2deg); /* 文字稍微倾斜，更调皮 */
        }

        .story-card.reverse .story-text h3 {
            transform: rotate(2deg);
        }

        /* 手机屏幕适配 */
        @media (max-width: 768px) {
            .story-card, .story-card.reverse {
                flex-direction: column;
                padding: 20px;
            }
            .story-img-wrapper {
                width: 100%;
            }
            .story-img-wrapper img {
                height: auto;
            }
            .story-text h3 {
                margin-top: 20px;
                font-size: 2.2em;
            }
        }

        /* 页脚与隐藏视频区域 */
        footer {
            text-align: center;
            padding: 40px;
            background-color: var(--secondary-color);
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            border-top: 8px dashed var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* 控制视频 20*20 的样式 */
        .tiny-video {
            width: 20px;
            height: 20px;
            border-radius: 50%; /* 做成小圆点，不容易被发现 */
            object-fit: cover;
            opacity: 0.5; /* 半透明，更好地隐藏在背景里 */
        }
    </style>
</head>
<body>

    <header>
        <h1>🐉 奶龙日记 🐉</h1>
        <p>捕捉一只野生小可爱！</p>
        <img src="ph.jpg" alt="奶龙主视觉图" class="hero-img">
    </header>

    <div class="container">
        <div class="story-timeline">
            
            <div class="story-card">
                <div class="story-img-wrapper">
                    <img src="1.jpg" alt="可爱奶龙">
                </div>
                <div class="story-text">
                    <h3>可爱奶龙</h3>
                </div>
            </div>

            <div class="story-card reverse">
                <div class="story-img-wrapper">
                    <img src="2.jpg" alt="可爱奶龙">
                </div>
                <div class="story-text">
                    <h3>可爱奶龙</h3>
                </div>
            </div>

            <div class="story-card">
                <div class="story-img-wrapper">
                    <img src="3.jpg" alt="可爱奶龙">
                </div>
                <div class="story-text">
                    <h3>可爱奶龙</h3>
                </div>
            </div>

            <div class="story-card reverse">
                <div class="story-img-wrapper">
                    <img src="4.jpg" alt="可爱奶龙">
                </div>
                <div class="story-text">
                    <h3>可爱奶龙</h3>
                </div>
            </div>

            <div class="story-card">
                <div class="story-img-wrapper">
                    <img src="5.jpg" alt="可爱奶龙">
                </div>
                <div class="story-text">
                    <h3>可爱奶龙</h3>
                </div>
            </div>

            <div class="story-card reverse">
                <div class="story-img-wrapper">
                    <img src="6.jpg" alt="可爱奶龙">
                </div>
                <div class="story-text">
                    <h3>可爱奶龙</h3>
                </div>
            </div>

            <div class="story-card">
                <div class="story-img-wrapper">
                    <img src="7.jpg" alt="可爱奶龙">
                </div>
                <div class="story-text">
                    <h3>可爱奶龙</h3>
                </div>
            </div>

            <div class="story-card reverse">
                <div class="story-img-wrapper">
                    <img src="8.jpg" alt="可爱奶龙">
                </div>
                <div class="story-text">
                    <h3>可爱奶龙</h3>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p>💛 本网页由超级喜欢奶龙的粉丝倾情制作 💛</p>
        <video id="bg-video" src="a.mp4" autoplay loop class="tiny-video"></video>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('bg-video');
            
            // 尝试在页面加载时自动播放
            let playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("浏览器拦截了自动播放，等待用户第一次点击...");
                    // 如果被拦截，监听用户的第一次点击操作（点击屏幕任何地方都可以）
                    document.body.addEventListener('click', function() {
                        if (video.paused) {
                            video.play();
                        }
                    }, { once: true }); // once: true 保证这个事件只触发一次
                });
            }
        });
    </script>
</body>
</html>
